<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Du Côté Traiteur — Espace de gestion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#ECE6DA; --cream:#F8F5EE; --ink:#221F18; --ink-soft:#5C5749;
    --bottle:#1E3D30; --bottle-2:#2C5644; --line:rgba(34,31,24,.14); --gold:#C8A24B;
    --ok:#3C8C5A; --ok-bg:#E3EEE3; --juste:#B9821C; --juste-bg:#F4EAD0;
    --court:#C0463A; --court-bg:#F4DED9;
    --shadow:0 1px 2px rgba(34,31,24,.06), 0 12px 32px -16px rgba(30,61,48,.28);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Inter',system-ui,sans-serif;color:var(--ink);background:var(--paper);-webkit-font-smoothing:antialiased;line-height:1.5}
  button{font:inherit}
  .hidden{display:none !important}
  .mono{font-family:'Space Mono',monospace}

  /* LOGIN */
  .login-wrap{min-height:100%;display:grid;grid-template-columns:minmax(0,1.05fr) minmax(0,1fr)}
  @media (max-width:820px){.login-wrap{grid-template-columns:1fr}}
  .brandside{background:var(--bottle);color:#F1EEE4;padding:clamp(28px,5vw,64px);display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}
  .brandside::after{content:"";position:absolute;right:-120px;bottom:-120px;width:380px;height:380px;border-radius:50%;border:1px solid rgba(241,238,228,.16);box-shadow:0 0 0 26px rgba(241,238,228,.05)}
  .wordmark{display:flex;align-items:center;gap:12px;position:relative;z-index:1}
  .wordmark .dot{width:11px;height:11px;border-radius:50%;background:var(--gold);box-shadow:0 0 0 4px rgba(200,162,75,.22)}
  .wordmark b{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:18px;letter-spacing:-.01em}
  .brand-lead{position:relative;z-index:1;max-width:30ch}
  .brand-lead h1{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:clamp(28px,4vw,42px);line-height:1.05;letter-spacing:-.02em;margin-bottom:14px}
  .brand-lead p{color:rgba(241,238,228,.78);font-size:15px;max-width:34ch}
  .legend{position:relative;z-index:1;border-top:1px solid rgba(241,238,228,.18);padding-top:20px}
  .legend .cap{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:rgba(241,238,228,.6);margin-bottom:12px}
  .legend ul{list-style:none;display:flex;gap:18px;flex-wrap:wrap}
  .legend li{display:flex;align-items:center;gap:8px;font-size:13px;color:rgba(241,238,228,.9)}
  .legend .pip{width:9px;height:9px;border-radius:2px}
  .formside{background:var(--paper);display:flex;align-items:center;justify-content:center;padding:clamp(28px,5vw,48px)}
  .card{width:100%;max-width:380px;background:var(--cream);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:clamp(26px,4vw,36px)}
  .card .eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:8px}
  .card h2{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:24px;letter-spacing:-.01em;margin-bottom:4px}
  .card .sub{color:var(--ink-soft);font-size:14px;margin-bottom:24px}

  .field{margin-bottom:16px}
  .field label{display:block;font-size:13px;font-weight:500;margin-bottom:6px}
  .field input,.field select,.field textarea{width:100%;font:inherit;font-size:15px;padding:11px 13px;border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--ink);transition:border-color .15s,box-shadow .15s}
  .field textarea{resize:vertical;min-height:62px}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--bottle-2);box-shadow:0 0 0 3px rgba(44,86,68,.16)}

  .btn{font-weight:600;font-size:15px;padding:12px 16px;border:none;border-radius:10px;cursor:pointer;background:var(--bottle);color:#F4F1E8;transition:background .15s,transform .05s;display:inline-flex;align-items:center;justify-content:center;gap:9px}
  .btn:hover{background:var(--bottle-2)} .btn:active{transform:translateY(1px)} .btn:disabled{opacity:.6;cursor:progress}
  .btn.full{width:100%}
  .btn.ghost{background:transparent;color:var(--bottle);border:1px solid var(--line)} .btn.ghost:hover{background:rgba(34,31,24,.05)}
  .btn.sm{padding:7px 13px;font-size:13.5px;border-radius:9px}
  .btn.danger{background:transparent;color:var(--court);border:1px solid rgba(192,70,58,.4)} .btn.danger:hover{background:var(--court-bg)}
  .btn .spin{width:15px;height:15px;border:2px solid rgba(244,241,232,.4);border-top-color:#F4F1E8;border-radius:50%;animation:spin .7s linear infinite;display:none}
  .btn.loading .spin{display:inline-block}
  @keyframes spin{to{transform:rotate(360deg)}}
  .msg{margin-top:14px;font-size:13.5px;border-radius:10px;padding:10px 13px;display:none;border:1px solid transparent}
  .msg.show{display:block} .msg.err{background:var(--court-bg);border-color:rgba(192,70,58,.3);color:#8A3127}

  /* SHELL */
  .app{display:none;min-height:100%;flex-direction:column}
  .app.show{display:flex}
  .topbar{background:var(--bottle);color:#F1EEE4;padding:13px clamp(16px,4vw,40px);display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
  .topbar .who{display:flex;align-items:center;gap:11px;font-size:14px}
  .role-chip{font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;padding:3px 9px;border-radius:999px;background:rgba(241,238,228,.15);border:1px solid rgba(241,238,228,.25)}
  .logout{font-size:13px;font-weight:500;color:#F1EEE4;background:transparent;border:1px solid rgba(241,238,228,.3);padding:7px 14px;border-radius:9px;cursor:pointer} .logout:hover{background:rgba(241,238,228,.12)}
  nav.tabs{background:var(--cream);border-bottom:1px solid var(--line);padding:0 clamp(16px,4vw,40px);display:flex;gap:4px;overflow-x:auto}
  nav.tabs button{background:none;border:none;padding:14px 16px;font-size:14.5px;font-weight:500;color:var(--ink-soft);cursor:pointer;border-bottom:2.5px solid transparent;white-space:nowrap}
  nav.tabs button.active{color:var(--bottle);border-bottom-color:var(--bottle);font-weight:600}
  main{padding:clamp(20px,4vw,38px);max-width:1040px;width:100%;margin:0 auto;flex:1}

  .head{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:16px}
  .head h2{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:25px;letter-spacing:-.01em}
  .head .tools{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .filter{display:flex;gap:8px;align-items:center;font-size:13px;color:var(--ink-soft)}
  .filter input{font:inherit;font-size:13.5px;padding:7px 10px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink)}
  .ro-note{font-size:12.5px;color:var(--ink-soft);background:rgba(34,31,24,.05);border:1px solid var(--line);padding:4px 10px;border-radius:999px}

  .legend2{display:flex;gap:16px;flex-wrap:wrap;font-size:12.5px;color:var(--ink-soft);margin-bottom:18px}
  .legend2 span{display:inline-flex;align-items:center;gap:7px}
  .legend2 .pip{width:9px;height:9px;border-radius:2px}

  .tickets{display:flex;flex-direction:column;gap:10px}
  .ticket{background:var(--cream);border:1px solid var(--line);border-radius:13px;box-shadow:var(--shadow);display:grid;grid-template-columns:80px 1fr auto auto;align-items:center;gap:16px;padding:14px 18px;cursor:pointer;transition:transform .12s,box-shadow .12s;text-align:left;width:100%}
  .ticket:hover{transform:translateY(-1px);box-shadow:0 2px 4px rgba(34,31,24,.07),0 18px 38px -20px rgba(30,61,48,.4)}
  @media (max-width:640px){.ticket{grid-template-columns:58px 1fr;grid-template-areas:"date title" "date meta";row-gap:5px}.ticket .t-covers{grid-area:meta;justify-self:start}.ticket .t-status{grid-area:meta;justify-self:end}}
  .t-date{text-align:center;border-right:1px solid var(--line);padding-right:14px}
  .t-date .d{font-family:'Space Mono',monospace;font-weight:700;font-size:19px;line-height:1}
  .t-date .m{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft);margin-top:3px}
  @media (max-width:640px){.t-date{border-right:none}}
  .t-title{font-weight:600;font-size:15px}
  .t-covers{font-family:'Space Mono',monospace;font-size:13.5px;color:var(--ink-soft);white-space:nowrap}
  .t-covers b{color:var(--ink);font-size:15px}
  .status{font-size:11.5px;font-weight:600;padding:5px 11px;border-radius:999px;white-space:nowrap;display:inline-flex;align-items:center;gap:6px}
  .status .pip{width:7px;height:7px;border-radius:50%}
  .s-ok{background:var(--ok-bg);color:#23663C}.s-ok .pip{background:var(--ok)}
  .s-juste{background:var(--juste-bg);color:#7E5A12}.s-juste .pip{background:var(--juste)}
  .s-court{background:var(--court-bg);color:#8A3127}.s-court .pip{background:var(--court)}
  .s-neutral{background:rgba(34,31,24,.06);color:var(--ink-soft)}.s-neutral .pip{background:var(--ink-soft)}

  table.grid{width:100%;border-collapse:collapse;background:var(--cream);border:1px solid var(--line);border-radius:13px;overflow:hidden;box-shadow:var(--shadow)}
  table.grid th,table.grid td{padding:11px 15px;text-align:left;font-size:14px;border-bottom:1px solid var(--line)}
  table.grid th{background:rgba(30,61,48,.05);font-size:11.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);font-weight:600}
  table.grid tr:last-child td{border-bottom:none}
  table.grid td.num,table.grid th.num{text-align:right;font-family:'Space Mono',monospace}
  tr.alert td{background:var(--court-bg)}
  .pill{font-size:11px;font-weight:600;padding:2px 8px;border-radius:999px;background:#fff;border:1px solid var(--line);color:var(--ink-soft)}
  .pill-alert{color:#8A3127;border-color:rgba(192,70,58,.35)}
  .qedit{width:74px;font:inherit;font-family:'Space Mono',monospace;font-size:13px;padding:5px 7px;border:1px solid var(--line);border-radius:7px;text-align:right}
  .mini{background:none;border:none;cursor:pointer;color:var(--bottle-2);font-size:15px;padding:0 5px} .mini.rs{color:var(--ink-soft)}

  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
  .rcard{background:var(--cream);border:1px solid var(--line);border-radius:13px;box-shadow:var(--shadow);padding:16px 18px;cursor:pointer;transition:transform .12s,box-shadow .12s;text-align:left}
  .rcard:hover{transform:translateY(-1px);box-shadow:0 2px 4px rgba(34,31,24,.07),0 18px 38px -20px rgba(30,61,48,.4)}
  .rcard h3{font-family:'Bricolage Grotesque',sans-serif;font-size:17px;font-weight:700;margin-bottom:4px}
  .rcard p{font-size:13px;color:var(--ink-soft)}
  .rcard .base{margin-top:10px;font-family:'Space Mono',monospace;font-size:12px;color:var(--bottle-2)}

  .state{text-align:center;padding:48px 20px;color:var(--ink-soft);background:var(--cream);border:1px dashed var(--line);border-radius:14px}
  .state b{display:block;color:var(--ink);font-family:'Bricolage Grotesque',sans-serif;font-size:18px;margin-bottom:6px}

  .progress{height:8px;background:rgba(34,31,24,.1);border-radius:999px;overflow:hidden;margin:6px 0 2px}
  .progress > i{display:block;height:100%;background:var(--ok);transition:width .25s}
  .check{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1px solid var(--line);border-radius:11px;background:var(--cream);margin-bottom:8px;cursor:pointer}
  .check input{width:20px;height:20px;accent-color:var(--bottle);flex:none}
  .check.done{opacity:.55}
  .check .q{margin-left:auto;font-family:'Space Mono',monospace;font-size:13px;color:var(--ink-soft)}

  /* MODAL */
  .overlay{position:fixed;inset:0;background:rgba(20,30,25,.5);display:none;align-items:center;justify-content:center;padding:18px;z-index:50}
  .overlay.show{display:flex}
  .modal{background:var(--paper);border-radius:16px;max-width:600px;width:100%;max-height:92vh;overflow:auto;box-shadow:0 30px 80px -20px rgba(0,0,0,.5)}
  .modal-head{position:sticky;top:0;background:var(--bottle);color:#F1EEE4;padding:18px 22px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;z-index:1}
  .modal-head h3{font-family:'Bricolage Grotesque',sans-serif;font-size:20px;font-weight:700}
  .modal-head .meta{font-size:13px;color:rgba(241,238,228,.8);margin-top:3px}
  .modal-close{background:transparent;border:none;color:#F1EEE4;font-size:24px;line-height:1;cursor:pointer;opacity:.8} .modal-close:hover{opacity:1}
  .modal-body{padding:22px}
  .modal-body h4{font-size:11.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);margin:18px 0 9px;display:flex;justify-content:space-between;align-items:center} .modal-body h4:first-child{margin-top:0}
  .line-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
  .line-row select,.line-row input{font:inherit;font-size:14px;padding:9px 10px;border:1px solid var(--line);border-radius:9px;background:#fff}
  .line-row select{flex:1;min-width:0} .line-row input.qty{width:84px} .line-row input.cap{width:74px}
  .line-row .rm{background:none;border:none;color:var(--court);cursor:pointer;font-size:20px;padding:0 4px;flex:none}

  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#F4F1E8;padding:12px 20px;border-radius:11px;font-size:14px;box-shadow:0 12px 30px rgba(0,0,0,.3);opacity:0;transition:opacity .2s,transform .2s;z-index:80;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast.bad{background:#7C2D26}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="login">
  <aside class="brandside">
    <div class="wordmark"><span class="dot"></span><b>Du Côté Traiteur</b></div>
    <div class="brand-lead">
      <h1>L'atelier, au cordeau.</h1>
      <p>Recettes, matériel, inventaire et commandes — avec le calcul des besoins par couvert, au même endroit.</p>
    </div>
    <div class="legend">
      <div class="cap">Couverture du stock</div>
      <ul>
        <li><span class="pip" style="background:var(--ok)"></span> Suffisant</li>
        <li><span class="pip" style="background:var(--juste)"></span> Juste</li>
        <li><span class="pip" style="background:var(--court)"></span> Court</li>
      </ul>
    </div>
  </aside>
  <section class="formside">
    <div class="card">
      <div class="eyebrow">Espace de gestion</div>
      <h2>Connexion</h2>
      <p class="sub">Votre accès s'adapte à votre rôle.</p>
      <form id="loginForm" novalidate>
        <div class="field"><label for="email">Email</label><input id="email" type="email" autocomplete="username" required placeholder="vous@traiteur.fr" /></div>
        <div class="field"><label for="pwd">Mot de passe</label><input id="pwd" type="password" autocomplete="current-password" required placeholder="••••••••" /></div>
        <button class="btn full" id="loginBtn" type="submit"><span class="spin"></span><span class="label">Se connecter</span></button>
        <div class="msg err" id="loginMsg" role="alert" aria-live="polite"></div>
      </form>
    </div>
  </section>
</div>

<!-- APP -->
<div class="app" id="app">
  <header class="topbar">
    <div class="wordmark"><span class="dot"></span><b>Du Côté Traiteur</b></div>
    <div class="who"><span id="hello">Bonjour</span><span class="role-chip" id="role">—</span><button class="logout" id="logoutBtn">Se déconnecter</button></div>
  </header>
  <nav class="tabs" id="tabs"></nav>
  <main id="content"></main>
</div>

<div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>
<div class="toast" id="toast"></div>

<script>
"use strict";
const API = ""; // même origine que le serveur → /api/...
const $ = (id)=>document.getElementById(id);

const mem={};
const store={get(k){try{return sessionStorage.getItem(k);}catch(e){return mem[k]!=null?mem[k]:null;}},set(k,v){try{sessionStorage.setItem(k,v);}catch(e){mem[k]=v;}},del(k){try{sessionStorage.removeItem(k);}catch(e){delete mem[k];}}};

let session={token:null,user:null};
const role=()=> session.user ? session.user.role : null;
const isAdmin=()=> role()==="admin";
const canAccounts=()=> role()==="admin"||role()==="manager";
const canOps=()=> role()==="manager";                       // commandes, stock
const canRecipes=()=> role()==="manager"||role()==="chef";  // recettes + quantités

const ROLE_LABEL={admin:"Administrateur",manager:"Gérant",chef:"Chef cuisinier",cuisinier:"Cuisinier",preparateur:"Préparateur"};
const TABS=[
  {id:"commandes",label:"Commandes",roles:["admin","manager","chef","cuisinier"]},
  {id:"stock",label:"Stock & alertes",roles:["admin","manager","chef"]},
  {id:"recettes",label:"Recettes",roles:["admin","manager","chef","cuisinier"]},
  {id:"admin",label:"Administration",roles:["admin","manager"]},
  {id:"prep",label:"Préparation",roles:["chef","preparateur"]},
];

const MOIS=["Jan","Fév","Mar","Avr","Mai","Juin","Juil","Août","Sep","Oct","Nov","Déc"];
const MOIS_LONG=["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"];
const esc=(s)=>String(s==null?"":s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]));
const num=(v)=>v==null||v===""?null:Number(v);
const fmtN=(v)=>{const n=Number(v);if(isNaN(n))return String(v);return Number.isInteger(n)?String(n):n.toFixed(2).replace(/\.?0+$/,"");};
function parseDate(d){if(!d)return null;const dt=new Date(String(d).slice(0,10));return isNaN(dt)?null:dt;}
function toast(t,bad){const e=$("toast");e.textContent=t;e.className="toast show"+(bad?" bad":"");setTimeout(()=>e.className="toast",2600);}

async function api(path,opts={}){
  const headers=Object.assign({},opts.headers||{});
  if(session.token)headers["Authorization"]="Bearer "+session.token;
  if(opts.body){headers["Content-Type"]="application/json";opts=Object.assign({},opts,{body:JSON.stringify(opts.body)});}
  const res=await fetch(API+path,Object.assign({},opts,{headers}));
  if(res.status===401){logout();throw new Error("Session expirée — reconnectez-vous.");}
  if(res.status===204)return null;
  const data=await res.json().catch(()=>({}));
  if(!res.ok)throw new Error(data.error||("Erreur "+res.status));
  return data;
}

/* ---------- LOGIN ---------- */
$("loginForm").addEventListener("submit",async(e)=>{
  e.preventDefault();
  const email=$("email").value.trim(),mot_de_passe=$("pwd").value;
  const btn=$("loginBtn"),msg=$("loginMsg");msg.classList.remove("show");
  const err=(t)=>{msg.textContent=t;msg.classList.add("show");};
  if(!email||!mot_de_passe){err("Renseignez votre email et votre mot de passe.");return;}
  btn.classList.add("loading");btn.disabled=true;btn.querySelector(".label").textContent="Connexion…";
  try{
    const r=await fetch(API+"/api/auth/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email,mot_de_passe})});
    const b=await r.json().catch(()=>({}));
    if(!r.ok){err(r.status===401?(b.error&&/bloqu/i.test(b.error)?b.error:"Email ou mot de passe incorrect."):(b.error||"Connexion impossible."));return;}
    if(!b.token){err("Réponse inattendue du serveur.");return;}
    session.token=b.token;session.user=b.utilisateur||{};
    store.set("dct_token",session.token);store.set("dct_user",JSON.stringify(session.user));
    enterApp();
  }catch(_){err("Serveur injoignable. Vérifiez votre connexion.");}
  finally{btn.classList.remove("loading");btn.disabled=false;btn.querySelector(".label").textContent="Se connecter";}
});
function logout(){session={token:null,user:null};store.del("dct_token");store.del("dct_user");$("app").classList.remove("show");$("login").style.display="grid";$("loginForm").reset();$("loginMsg").classList.remove("show");closeModal();}
$("logoutBtn").addEventListener("click",logout);

function enterApp(){
  const u=session.user||{};
  $("hello").textContent=u.nom?("Bonjour, "+u.nom):"Bonjour";
  $("role").textContent=ROLE_LABEL[u.role]||"—";
  const allowed=TABS.filter(t=>t.roles.includes(u.role));
  $("tabs").innerHTML=allowed.map((t,i)=>`<button data-view="${t.id}"${i===0?' class="active"':''}>${t.label}</button>`).join("");
  $("login").style.display="none";$("app").classList.add("show");
  if(allowed.length) switchView(allowed[0].id);
}
$("tabs").addEventListener("click",(e)=>{const b=e.target.closest("button[data-view]");if(b)switchView(b.dataset.view);});
function switchView(view){
  [...$("tabs").children].forEach(b=>b.classList.toggle("active",b.dataset.view===view));
  ({commandes:renderCommandes,stock:renderStock,recettes:renderRecettes,admin:renderAdmin,prep:renderPrep}[view]||(()=>{}))();
}

/* ---------- helpers ---------- */
function monthRange(){const n=new Date(),y=n.getFullYear(),m=n.getMonth(),p=x=>String(x).padStart(2,"0");return{from:`${y}-${p(m+1)}-01`,to:`${y}-${p(m+1)}-${p(new Date(y,m+1,0).getDate())}`};}
function statusChip(s){const map={ok:["s-ok","Stock OK"],juste:["s-juste","Juste"],court:["s-court","Court"]};const x=map[(s||"").toLowerCase()]||["s-neutral",s||"—"];return `<span class="status ${x[0]}"><span class="pip"></span>${esc(x[1])}</span>`;}
function statusText(s){const m={ok:"Stock suffisant",juste:"Stock juste",court:"Stock court"};return m[(s||"").toLowerCase()]||"—";}

/* ---------- COMMANDES ---------- */
let cmdRange=monthRange();
function renderCommandes(){
  $("content").innerHTML=`<div class="head"><h2>Commandes</h2><div class="tools">
      <span class="filter">Du <input type="date" id="fFrom" value="${cmdRange.from}"> au <input type="date" id="fTo" value="${cmdRange.to}"></span>
      ${canOps()?`<button class="btn sm" id="newCmd">+ Nouvelle commande</button>`:``}
    </div></div>
    <div class="legend2"><span><span class="pip" style="background:var(--ok)"></span> Suffisant</span><span><span class="pip" style="background:var(--juste)"></span> Juste</span><span><span class="pip" style="background:var(--court)"></span> Court</span></div>
    <div class="tickets" id="cmdList"><div class="state">Chargement…</div></div>`;
  const reload=()=>{cmdRange.from=$("fFrom").value;cmdRange.to=$("fTo").value;loadCmdList();};
  $("fFrom").addEventListener("change",reload);$("fTo").addEventListener("change",reload);
  if(canOps())$("newCmd").addEventListener("click",()=>openCommandeForm(null));
  loadCmdList();
}
async function loadCmdList(){
  const box=$("cmdList");box.innerHTML=`<div class="state">Chargement…</div>`;
  try{
    const list=await api(`/api/commandes?from=${cmdRange.from}&to=${cmdRange.to}`);
    if(!list.length){box.innerHTML=`<div class="state"><b>Aucune commande</b>Rien sur cette période.</div>`;return;}
    box.innerHTML=list.map(c=>{const dt=parseDate(c.date_event);const d=dt?String(dt.getDate()).padStart(2,"0"):"--";const mo=dt?MOIS[dt.getMonth()]:"";const cv=num(c.total_couverts);
      return `<button class="ticket" data-id="${c.id}"><div class="t-date"><div class="d">${d}</div><div class="m">${mo}</div></div><div class="t-title">${esc(c.client||"Sans client")}</div><div class="t-covers">${cv!=null?`<b>${fmtN(cv)}</b> couv.`:""}</div><div class="t-status">${statusChip(c.statut)}</div></button>`;}).join("");
    box.querySelectorAll(".ticket").forEach(t=>t.addEventListener("click",()=>openCommande(t.dataset.id)));
  }catch(e){box.innerHTML=`<div class="state"><b>Lecture impossible</b>${esc(e.message)}</div>`;}
}
async function openCommande(id){
  openModal(`<div class="modal-head"><div><h3>Commande</h3></div><button class="modal-close" onclick="closeModal()">×</button></div><div class="modal-body"><div class="state">Chargement…</div></div>`);
  try{
    const c=await api(`/api/commandes/${id}`);renderCommandeDetail(c);
  }catch(e){$("modal").querySelector(".modal-body").innerHTML=`<div class="state"><b>Erreur</b>${esc(e.message)}</div>`;}
}
function renderCommandeDetail(c){
  const dt=parseDate(c.date_event);const editable=canRecipes();const r=role();
  const showMateriel=r!=="cuisinier";const cuisineFirst=(r==="chef"||r==="cuisinier");const cuisineCheck=(r==="cuisinier");
  const lignes=(c.lignes||[]).map(l=>`<tr><td>${esc(l.nom)}</td><td class="num">${fmtN(l.nb_personnes)}</td></tr>`).join("")||`<tr><td colspan="2">—</td></tr>`;
  function matSection(){
    const rows=(c.materiel||[]).map(m=>{const manque=num(m.manque)||0;const tags=`${m.extra?' <span class="pill pill-alert">extra</span>':''}${m.ajuste?' <span class="pill">ajusté</span>':''}`;
      const qcell=editable
        ? `<input class="qedit" type="number" min="0" step="any" value="${esc(m.quantite)}" data-mat="${m.materiel_id}"> ${esc(m.unite||"")} ${m.ajuste?`<button class="mini rs" title="Revenir au calcul auto" data-rsmat="${m.materiel_id}">↺</button>`:""}`
        : `${fmtN(m.quantite)} ${esc(m.unite||"")}`;
      return `<tr class="${manque>0?"alert":""}"><td>${esc(m.materiel)}${tags}</td><td class="num">${qcell}</td><td class="num">${fmtN(m.stock)}</td><td class="num">${manque>0?fmtN(manque):"—"}</td></tr>`;}).join("")||`<tr><td colspan="4">Aucun matériel</td></tr>`;
    return `<h4>Matériel — besoins effectifs${editable?` <span class="ro-note">quantités modifiables</span>`:""}</h4><table class="grid"><thead><tr><th>Matériel</th><th class="num">Besoin</th><th class="num">Stock</th><th class="num">Manque</th></tr></thead><tbody>${rows}</tbody></table>`;
  }
  function cuiSection(){
    if(cuisineCheck){
      if(!prepDone[c.id])prepDone[c.id]=new Set();
      const inner=(c.cuisine||[]).map(i=>{const k="c"+i.ingredient_id;const done=prepDone[c.id].has(k);return `<label class="check ${done?"done":""}" data-key="${k}"><input type="checkbox" ${done?"checked":""}><span>${esc(i.ingredient)}</span><span class="q">${fmtN(i.quantite)} ${esc(i.unite||"")}</span></label>`;}).join("")||`<div class="state">Aucun ingrédient.</div>`;
      return `<h4>Cuisine — à préparer</h4><div class="progress"><i id="cuiBar" style="width:0%"></i></div><div id="cuiPct" style="font-size:12.5px;color:var(--ink-soft);margin-bottom:12px"></div><div id="cuiItems">${inner}</div>`;
    }
    const rows=(c.cuisine||[]).map(i=>{const tags=`${i.extra?' <span class="pill pill-alert">extra</span>':''}${i.ajuste?' <span class="pill">ajusté</span>':''}`;
      const qcell=editable
        ? `<input class="qedit" type="number" min="0" step="any" value="${esc(i.quantite)}" data-cui="${i.ingredient_id}"> ${esc(i.unite||"")} ${i.ajuste?`<button class="mini rs" title="Revenir au calcul auto" data-rscui="${i.ingredient_id}">↺</button>`:""}`
        : `${fmtN(i.quantite)} ${esc(i.unite||"")}`;
      return `<tr><td>${esc(i.ingredient)}${tags}</td><td class="num">${qcell}</td></tr>`;}).join("")||`<tr><td colspan="2">Aucun ingrédient</td></tr>`;
    return `<h4>Cuisine — ingrédients</h4><table class="grid"><thead><tr><th>Ingrédient</th><th class="num">Quantité</th></tr></thead><tbody>${rows}</tbody></table>`;
  }
  const sections=cuisineFirst?(cuiSection()+(showMateriel?matSection():"")):((showMateriel?matSection():"")+cuiSection());
  const notesBox=c.notes?`<div style="background:var(--juste-bg);border:1px solid rgba(185,130,28,.35);border-left:4px solid var(--juste);border-radius:10px;padding:12px 14px;margin-bottom:18px;font-size:14.5px"><b style="display:block;font-size:11.5px;letter-spacing:.08em;text-transform:uppercase;color:#7E5A12;margin-bottom:4px">Notes</b>${esc(c.notes)}</div>`:"";
  $("modal").innerHTML=`
    <div class="modal-head"><div><h3>${esc(c.client||"Commande sans client")}</h3><div class="meta">${dt?dt.toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long",year:"numeric"}):""} · ${statusText(c.statut)}</div></div><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      ${notesBox}
      <h4>Recettes</h4>
      <table class="grid"><thead><tr><th>Recette</th><th class="num">Couverts</th></tr></thead><tbody>${lignes}</tbody></table>
      ${sections}
      ${canOps()?`<div style="margin-top:20px;display:flex;gap:10px"><button class="btn sm" id="editCmd">Modifier la commande</button><button class="btn danger sm" id="delCmd">Supprimer</button></div>`:""}
    </div>`;
  if(editable){
    $("modal").querySelectorAll("input[data-mat]").forEach(inp=>inp.addEventListener("change",()=>adjust(c.id,"materiel",inp.dataset.mat,inp.value)));
    $("modal").querySelectorAll("input[data-cui]").forEach(inp=>inp.addEventListener("change",()=>adjust(c.id,"cuisine",inp.dataset.cui,inp.value)));
    $("modal").querySelectorAll("[data-rsmat]").forEach(b=>b.addEventListener("click",()=>resetAdjust(c.id,"materiel",b.dataset.rsmat)));
    $("modal").querySelectorAll("[data-rscui]").forEach(b=>b.addEventListener("click",()=>resetAdjust(c.id,"cuisine",b.dataset.rscui)));
  }
  if(cuisineCheck){
    const tot=(c.cuisine||[]).length;
    const refresh=()=>{const dn=prepDone[c.id].size;const bar=$("cuiBar"),pct=$("cuiPct");if(bar)bar.style.width=(tot?Math.round(dn/tot*100):0)+"%";if(pct)pct.textContent=tot?(dn===tot?"✓ Tout est prêt":`${dn} / ${tot} préparés`):"";};
    $("modal").querySelectorAll("#cuiItems .check").forEach(l=>l.querySelector("input").addEventListener("change",(e)=>{const k=l.dataset.key;if(e.target.checked)prepDone[c.id].add(k);else prepDone[c.id].delete(k);l.classList.toggle("done",e.target.checked);refresh();}));
    refresh();
  }
  if(canOps()){$("editCmd").addEventListener("click",()=>openCommandeForm(c));$("delCmd").addEventListener("click",()=>deleteCommande(c.id));}
}

async function openCommandeForm(existing){
  const edit=!!existing;
  let recettes=[];try{recettes=await api("/api/recettes");}catch(e){toast(e.message,true);return;}
  if(!recettes.length){toast("Aucune recette. Créez-en d'abord.",true);return;}
  const opts=recettes.map(r=>`<option value="${r.id}">${esc(r.nom)}</option>`).join("");
  const dval=edit&&existing.date_event?String(existing.date_event).slice(0,10):"";
  openModal(`<div class="modal-head"><div><h3>${edit?"Modifier la commande":"Nouvelle commande"}</h3></div><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="field"><label>Client</label><input id="ncClient" placeholder="Nom du client / événement" value="${edit&&existing.client?esc(existing.client):""}"></div>
      <div class="field"><label>Date de l'événement</label><input id="ncDate" type="date" required value="${dval}"></div>
      <div class="field"><label>Nombre de couverts (total)</label><input id="ncCouverts" type="number" min="1" placeholder="ex. 50"${edit?"":' value="50"'}></div>
      <div class="field"><label>Notes (optionnel)</label><textarea id="ncNotes" placeholder="Allergies, horaire de livraison…">${edit&&existing.notes?esc(existing.notes):""}</textarea></div>
      <h4>Recettes &amp; couverts</h4><div id="ncLines"></div>
      <button class="btn ghost sm" id="ncAdd" style="margin:4px 0 16px">+ Ajouter une recette</button>
      <button class="btn full" id="ncSave"><span class="spin"></span><span class="label">${edit?"Enregistrer les modifications":"Créer la commande"}</span></button>
      <div class="msg err" id="ncMsg"></div>
    </div>`);
  const box=$("ncLines");
  const couvVal=()=>{const v=Number($("ncCouverts").value);return v>0?v:10;};
  function addLine(rid,qty){const r=document.createElement("div");r.className="line-row";r.innerHTML=`<select>${opts}</select><input class="qty" type="number" min="1" value="${qty!=null?esc(qty):couvVal()}"><button class="rm">×</button>`;if(rid!=null)r.querySelector("select").value=rid;r.querySelector(".rm").addEventListener("click",()=>r.remove());box.appendChild(r);}
  if(edit&&(existing.lignes||[]).length)existing.lignes.forEach(l=>addLine(l.recette_id,l.nb_personnes));else addLine();
  $("ncAdd").addEventListener("click",()=>addLine());
  $("ncCouverts").addEventListener("input",()=>{const v=couvVal();box.querySelectorAll(".line-row .qty").forEach(i=>i.value=v);});
  $("ncSave").addEventListener("click",async()=>{
    const m=$("ncMsg");m.classList.remove("show");const date_event=$("ncDate").value;
    const lignes=[...box.querySelectorAll(".line-row")].map(r=>({recette_id:Number(r.querySelector("select").value),nb_personnes:Number(r.querySelector(".qty").value)})).filter(l=>l.recette_id&&l.nb_personnes>0);
    if(!date_event||!lignes.length){m.textContent="Une date et au moins une recette sont requises.";m.classList.add("show");return;}
    const btn=$("ncSave");btn.classList.add("loading");btn.disabled=true;
    const body={client:$("ncClient").value.trim()||null,date_event,notes:$("ncNotes").value.trim()||null,lignes};
    try{
      if(edit)await api(`/api/commandes/${existing.id}`,{method:"PUT",body});
      else await api("/api/commandes",{method:"POST",body});
      closeModal();toast(edit?"Commande modifiée.":"Commande créée.");loadCmdList();
    }catch(e){m.textContent=e.message;m.classList.add("show");}finally{btn.classList.remove("loading");btn.disabled=false;}
  });
}

/* ---------- STOCK ---------- */
async function renderStock(){
  $("content").innerHTML=`<div class="head"><h2>Stock &amp; alertes</h2>${canOps()?"":`<span class="ro-note">consultation seule</span>`}</div><div id="stockBox"><div class="state">Chargement…</div></div>`;
  try{
    const inv=await api("/api/inventaire");const a=inv.filter(x=>x.en_alerte).length;
    const banner=a?`<div class="legend2"><span><span class="pip" style="background:var(--court)"></span> ${a} article${a>1?"s":""} sous le seuil</span></div>`:`<div class="legend2"><span><span class="pip" style="background:var(--ok)"></span> Tout le matériel est au-dessus de son seuil</span></div>`;
    const rows=inv.map(x=>`<tr class="${x.en_alerte?"alert":""}"><td>${esc(x.nom)}</td><td class="num">${fmtN(x.quantite_stock)} ${esc(x.unite||"")}</td><td class="num">${fmtN(x.seuil_alerte)}</td><td>${x.en_alerte?`<span class="pill pill-alert">à réapprovisionner</span>`:`<span class="status s-ok"><span class="pip"></span>OK</span>`}</td>${canOps()?`<td><button class="btn ghost sm" data-edit="${x.materiel_id}" data-nom="${esc(x.nom)}" data-stock="${esc(x.quantite_stock)}" data-seuil="${esc(x.seuil_alerte)}">Modifier</button></td>`:""}</tr>`).join("")||`<tr><td colspan="${canOps()?5:4}">Aucun matériel</td></tr>`;
    $("stockBox").innerHTML=banner+`<table class="grid"><thead><tr><th>Matériel</th><th class="num">En stock</th><th class="num">Seuil</th><th>État</th>${canOps()?"<th></th>":""}</tr></thead><tbody>${rows}</tbody></table>`;
    if(canOps())$("stockBox").querySelectorAll("[data-edit]").forEach(b=>b.addEventListener("click",()=>editStock(b.dataset)));
  }catch(e){$("stockBox").innerHTML=`<div class="state"><b>Lecture impossible</b>${esc(e.message)}</div>`;}
}
function editStock(d){
  openModal(`<div class="modal-head"><div><h3>${esc(d.nom)}</h3><div class="meta">Stock et seuil d'alerte</div></div><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="field"><label>Quantité en stock</label><input id="esStock" type="number" min="0" step="any" value="${esc(d.stock)}"></div>
      <div class="field"><label>Seuil d'alerte</label><input id="esSeuil" type="number" min="0" step="any" value="${esc(d.seuil)}"></div>
      <button class="btn full" id="esSave"><span class="spin"></span><span class="label">Enregistrer</span></button>
      <div class="msg err" id="esMsg"></div></div>`);
  $("esSave").addEventListener("click",async()=>{
    const m=$("esMsg");m.classList.remove("show");const quantite_stock=Number($("esStock").value),seuil_alerte=Number($("esSeuil").value);
    if(!(quantite_stock>=0)||!(seuil_alerte>=0)){m.textContent="Valeurs invalides.";m.classList.add("show");return;}
    const btn=$("esSave");btn.classList.add("loading");btn.disabled=true;
    try{await api(`/api/materiels/${d.edit}/inventaire`,{method:"PUT",body:{quantite_stock,seuil_alerte}});closeModal();toast("Stock mis à jour.");renderStock();}
    catch(e){m.textContent=e.message;m.classList.add("show");}finally{btn.classList.remove("loading");btn.disabled=false;}
  });
}

/* ---------- RECETTES ---------- */
async function renderRecettes(){
  $("content").innerHTML=`<div class="head"><h2>Recettes</h2><div class="tools">${canRecipes()?`<button class="btn sm" id="newRec">+ Nouvelle recette</button>`:`<span class="ro-note">consultation seule</span>`}</div></div><div id="recBox"><div class="state">Chargement…</div></div>`;
  if(canRecipes())$("newRec").addEventListener("click",()=>openRecetteEditor(null));
  try{
    const list=await api("/api/recettes");
    if(!list.length){$("recBox").innerHTML=`<div class="state"><b>Aucune recette</b>${canRecipes()?"Créez la première avec « + Nouvelle recette ».":"Le catalogue est vide."}</div>`;return;}
    $("recBox").innerHTML=`<div class="cards">`+list.map(r=>`<button class="rcard" data-id="${r.id}"><h3>${esc(r.nom)}</h3>${r.description?`<p>${esc(r.description)}</p>`:""}<div class="base">base : ${fmtN(r.portion_base)} couverts</div></button>`).join("")+`</div>`;
    $("recBox").querySelectorAll(".rcard").forEach(b=>b.addEventListener("click",()=>openRecette(b.dataset.id)));
  }catch(e){$("recBox").innerHTML=`<div class="state"><b>Lecture impossible</b>${esc(e.message)}</div>`;}
}
async function openRecette(id){
  openModal(`<div class="modal-head"><div><h3>Recette</h3></div><button class="modal-close" onclick="closeModal()">×</button></div><div class="modal-body"><div class="state">Chargement…</div></div>`);
  try{
    const r=await api(`/api/recettes/${id}`);
    const ing=(r.ingredients||[]).map(i=>`<tr><td>${esc(i.nom)}</td><td class="num">${fmtN(i.quantite)} ${esc(i.unite||"")}</td></tr>`).join("")||`<tr><td colspan="2">—</td></tr>`;
    const mat=(r.materiels||[]).map(m=>`<tr><td>${esc(m.nom)}</td><td>${m.mode==="par_palier"?`1 / ${fmtN(m.capacite)} couv.`:"proportionnel"}</td><td class="num">${fmtN(m.quantite)} ${esc(m.unite||"")}</td></tr>`).join("")||`<tr><td colspan="3">—</td></tr>`;
    $("modal").innerHTML=`<div class="modal-head"><div><h3>${esc(r.nom)}</h3><div class="meta">Base de ${fmtN(r.portion_base)} couverts</div></div><button class="modal-close" onclick="closeModal()">×</button></div>
      <div class="modal-body">
        ${r.description?`<p style="font-size:14px;color:var(--ink-soft);margin-bottom:6px">${esc(r.description)}</p>`:""}
        <h4>Ingrédients (cuisine)</h4><table class="grid"><thead><tr><th>Ingrédient</th><th class="num">Quantité / base</th></tr></thead><tbody>${ing}</tbody></table>
        ${role()!=="cuisinier"?`<h4>Matériel</h4><table class="grid"><thead><tr><th>Matériel</th><th>Calcul</th><th class="num">Quantité</th></tr></thead><tbody>${mat}</tbody></table>`:""}
        ${canRecipes()?`<div style="margin-top:20px;display:flex;gap:10px"><button class="btn sm" id="recEdit">Modifier</button><button class="btn danger sm" id="recDel">Supprimer</button></div>`:""}
      </div>`;
    if(canRecipes()){$("recEdit").addEventListener("click",()=>openRecetteEditor(r.id));$("recDel").addEventListener("click",()=>deleteRecette(r.id,r.nom));}
  }catch(e){$("modal").querySelector(".modal-body").innerHTML=`<div class="state"><b>Erreur</b>${esc(e.message)}</div>`;}
}
async function deleteRecette(id,nom){
  if(!confirm(`Supprimer la recette « ${nom} » ?`))return;
  try{await api(`/api/recettes/${id}`,{method:"DELETE"});closeModal();toast("Recette supprimée.");renderRecettes();}
  catch(e){toast(e.message,true);}
}
async function openRecetteEditor(id){
  let ings=[],mats=[],rec=null;
  try{[ings,mats]=await Promise.all([api("/api/ingredients"),api("/api/materiels")]);if(id)rec=await api(`/api/recettes/${id}`);}
  catch(e){toast(e.message,true);return;}
  const ingOpts=ings.map(i=>`<option value="${i.id}">${esc(i.nom)} (${esc(i.unite)})</option>`).join("");
  const matOpts=mats.map(m=>`<option value="${m.id}">${esc(m.nom)} (${esc(m.unite)})</option>`).join("");
  openModal(`<div class="modal-head"><div><h3>${id?"Modifier la recette":"Nouvelle recette"}</h3></div><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="field"><label>Nom</label><input id="reNom" value="${rec?esc(rec.nom):""}"></div>
      <div class="field"><label>Description</label><input id="reDesc" value="${rec&&rec.description?esc(rec.description):""}"></div>
      <div class="field"><label>Portion de base (couverts)</label><input id="reBase" type="number" min="1" value="${rec?esc(rec.portion_base):"10"}"></div>
      <h4>Ingrédients (cuisine)</h4><div id="reIng"></div><button class="btn ghost sm" id="reIngAdd" style="margin:4px 0 8px">+ Ingrédient</button>
      <h4>Matériel</h4><div id="reMat"></div><button class="btn ghost sm" id="reMatAdd" style="margin:4px 0 14px">+ Matériel</button>
      <button class="btn full" id="reSave"><span class="spin"></span><span class="label">${id?"Enregistrer":"Créer la recette"}</span></button>
      <div class="msg err" id="reMsg"></div>
    </div>`);
  const ingBox=$("reIng"),matBox=$("reMat");
  function ingRow(sel,q){const r=document.createElement("div");r.className="line-row";r.innerHTML=`<select>${ingOpts}</select><input class="qty" type="number" min="0" step="any" placeholder="qté" value="${q!=null?esc(q):""}"><button class="rm">×</button>`;if(sel!=null)r.querySelector("select").value=sel;r.querySelector(".rm").addEventListener("click",()=>r.remove());ingBox.appendChild(r);}
  function matRow(sel,mode,q,cap){const r=document.createElement("div");r.className="line-row";r.innerHTML=`<select class="m-art">${matOpts}</select><select class="m-mode"><option value="proportionnel">Prorata</option><option value="par_palier">Palier</option></select><input class="qty" type="number" min="0" step="any" placeholder="qté" value="${q!=null?esc(q):""}"><input class="cap" type="number" min="1" placeholder="/N pers" value="${cap!=null?esc(cap):""}"><button class="rm">×</button>`;
    if(sel!=null)r.querySelector(".m-art").value=sel;const modeSel=r.querySelector(".m-mode"),capInp=r.querySelector(".cap");if(mode)modeSel.value=mode;const sync=()=>{capInp.style.display=modeSel.value==="par_palier"?"":"none";};modeSel.addEventListener("change",sync);sync();r.querySelector(".rm").addEventListener("click",()=>r.remove());matBox.appendChild(r);}
  if(rec){(rec.ingredients||[]).forEach(i=>ingRow(i.ingredient_id,i.quantite));(rec.materiels||[]).forEach(m=>matRow(m.materiel_id,m.mode,m.quantite,m.capacite));}
  $("reIngAdd").addEventListener("click",()=>ingRow());$("reMatAdd").addEventListener("click",()=>matRow());
  $("reSave").addEventListener("click",async()=>{
    const m=$("reMsg");m.classList.remove("show");
    const nom=$("reNom").value.trim();if(!nom){m.textContent="Le nom est requis.";m.classList.add("show");return;}
    const ingredients=[...ingBox.querySelectorAll(".line-row")].map(r=>({ingredient_id:Number(r.querySelector("select").value),quantite:Number(r.querySelector(".qty").value)})).filter(x=>x.ingredient_id&&x.quantite>=0);
    const materiels=[...matBox.querySelectorAll(".line-row")].map(r=>{const mode=r.querySelector(".m-mode").value;return{materiel_id:Number(r.querySelector(".m-art").value),mode,quantite:Number(r.querySelector(".qty").value),capacite:mode==="par_palier"?Number(r.querySelector(".cap").value):null};}).filter(x=>x.materiel_id&&x.quantite>=0&&(x.mode!=="par_palier"||x.capacite>0));
    const body={nom,description:$("reDesc").value.trim()||null,portion_base:Number($("reBase").value)||10,ingredients,materiels};
    const btn=$("reSave");btn.classList.add("loading");btn.disabled=true;
    try{await api(id?`/api/recettes/${id}`:"/api/recettes",{method:id?"PUT":"POST",body});closeModal();toast(id?"Recette enregistrée.":"Recette créée.");renderRecettes();}
    catch(e){m.textContent=e.message;m.classList.add("show");}finally{btn.classList.remove("loading");btn.disabled=false;}
  });
}

/* ---------- ADMINISTRATION ---------- */
async function renderAdmin(){
  $("content").innerHTML=`<div class="head"><h2>Administration</h2><div class="tools"><button class="btn sm" id="newUser">+ Nouvel utilisateur</button></div></div>
    <p style="font-size:13.5px;color:var(--ink-soft);margin-bottom:16px">Créez, bloquez ou supprimez les comptes et choisissez leur rôle.</p>
    <div id="userBox"><div class="state">Chargement…</div></div>`;
  $("newUser").addEventListener("click",openNewUser);loadUsers();
}
async function loadUsers(){
  const box=$("userBox");box.innerHTML=`<div class="state">Chargement…</div>`;
  try{
    const list=await api("/api/utilisateurs");
    const rows=list.map(u=>{const me=u.id===session.user.id;const blocked=!!u.bloque;
      return `<tr class="${blocked?"alert":""}"><td>${esc(u.nom)}${me?` <span class="pill">vous</span>`:""}</td><td>${esc(u.email)}</td><td>${ROLE_LABEL[u.role]||esc(u.role)}</td><td>${blocked?`<span class="pill pill-alert">bloqué</span>`:`<span class="status s-ok"><span class="pip"></span>actif</span>`}</td><td>${me?"":`<button class="btn ghost sm" data-block="${u.id}" data-b="${blocked?1:0}" data-nom="${esc(u.nom)}">${blocked?"Débloquer":"Bloquer"}</button> <button class="btn danger sm" data-del="${u.id}" data-nom="${esc(u.nom)}">Supprimer</button>`}</td></tr>`;}).join("")||`<tr><td colspan="5">Aucun utilisateur</td></tr>`;
    box.innerHTML=`<table class="grid"><thead><tr><th>Nom</th><th>Email</th><th>Rôle</th><th>État</th><th></th></tr></thead><tbody>${rows}</tbody></table>`;
    box.querySelectorAll("[data-del]").forEach(b=>b.addEventListener("click",()=>delUser(b.dataset.del,b.dataset.nom)));
    box.querySelectorAll("[data-block]").forEach(b=>b.addEventListener("click",()=>blockUser(b.dataset.block,b.dataset.b==="1",b.dataset.nom)));
  }catch(e){box.innerHTML=`<div class="state"><b>Accès indisponible</b>${esc(e.message)}</div>`;}
}
function openNewUser(){
  openModal(`<div class="modal-head"><div><h3>Nouvel utilisateur</h3></div><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="field"><label>Nom</label><input id="nuNom" placeholder="Prénom Nom"></div>
      <div class="field"><label>Email</label><input id="nuEmail" type="email" placeholder="employe@traiteur.fr"></div>
      <div class="field"><label>Mot de passe initial</label><input id="nuPwd" type="text" placeholder="À communiquer à la personne"></div>
      <div class="field"><label>Rôle</label><select id="nuRole"><option value="preparateur">Préparateur</option><option value="cuisinier">Cuisinier</option><option value="chef">Chef cuisinier</option><option value="manager">Gérant</option><option value="admin">Administrateur</option></select></div>
      <button class="btn full" id="nuSave"><span class="spin"></span><span class="label">Créer le compte</span></button>
      <div class="msg err" id="nuMsg"></div></div>`);
  $("nuSave").addEventListener("click",async()=>{
    const m=$("nuMsg");m.classList.remove("show");
    const nom=$("nuNom").value.trim(),email=$("nuEmail").value.trim(),mot_de_passe=$("nuPwd").value,role=$("nuRole").value;
    if(!nom||!email||!mot_de_passe){m.textContent="Nom, email et mot de passe sont requis.";m.classList.add("show");return;}
    const btn=$("nuSave");btn.classList.add("loading");btn.disabled=true;
    try{await api("/api/utilisateurs",{method:"POST",body:{nom,email,mot_de_passe,role}});closeModal();toast("Compte créé.");loadUsers();}
    catch(e){m.textContent=e.message;m.classList.add("show");}finally{btn.classList.remove("loading");btn.disabled=false;}
  });
}
async function delUser(id,nom){if(!confirm(`Supprimer définitivement le compte de ${nom} ?`))return;try{await api(`/api/utilisateurs/${id}`,{method:"DELETE"});toast("Compte supprimé.");loadUsers();}catch(e){toast(e.message,true);}}
async function blockUser(id,blocked,nom){try{await api(`/api/utilisateurs/${id}/blocage`,{method:"PUT",body:{bloque:!blocked}});toast(blocked?"Compte débloqué.":"Compte bloqué.");loadUsers();}catch(e){toast(e.message,true);}}

/* ---------- PRÉPARATION (mobile, coches locales) ---------- */
const prepDone={}; // {commandeId: Set(itemKey)} — local à la session
async function renderPrep(){
  $("content").innerHTML=`<div class="head"><h2>Préparation</h2></div>
    <p style="font-size:13.5px;color:var(--ink-soft);margin-bottom:16px">Commandes à venir. Touchez-en une pour cocher le matériel et la cuisine au fur et à mesure.</p>
    <div class="tickets" id="prepList"><div class="state">Chargement…</div></div>`;
  const n=new Date(),p=x=>String(x).padStart(2,"0");
  const from=`${n.getFullYear()}-${p(n.getMonth()+1)}-${p(n.getDate())}`;
  const to=new Date(n.getTime()+30*864e5);const toS=`${to.getFullYear()}-${p(to.getMonth()+1)}-${p(to.getDate())}`;
  try{
    const list=await api(`/api/commandes?from=${from}&to=${toS}`);
    if(!list.length){$("prepList").innerHTML=`<div class="state"><b>Rien à préparer</b>Aucune commande dans les 30 prochains jours.</div>`;return;}
    $("prepList").innerHTML=list.map(c=>{const dt=parseDate(c.date_event);const d=dt?String(dt.getDate()).padStart(2,"0"):"--";const mo=dt?MOIS[dt.getMonth()]:"";const cv=num(c.total_couverts);
      return `<button class="ticket" data-id="${c.id}"><div class="t-date"><div class="d">${d}</div><div class="m">${mo}</div></div><div class="t-title">${esc(c.client||"Sans client")}</div><div class="t-covers">${cv!=null?`<b>${fmtN(cv)}</b> couv.`:""}</div><div class="t-status">${statusChip(c.statut)}</div></button>`;}).join("");
    $("prepList").querySelectorAll(".ticket").forEach(t=>t.addEventListener("click",()=>openPrep(t.dataset.id)));
  }catch(e){$("prepList").innerHTML=`<div class="state"><b>Lecture impossible</b>${esc(e.message)}</div>`;}
}
async function openPrep(id){
  openModal(`<div class="modal-head"><div><h3>Préparation</h3></div><button class="modal-close" onclick="closeModal()">×</button></div><div class="modal-body"><div class="state">Chargement…</div></div>`);
  try{
    const c=await api(`/api/commandes/${id}`);const dt=parseDate(c.date_event);
    if(!prepDone[id])prepDone[id]=new Set();
    const items=[];
    (c.materiel||[]).forEach(m=>items.push({key:"m"+m.materiel_id,label:m.materiel,q:`${fmtN(m.quantite)} ${m.unite||""}`}));
    (c.cuisine||[]).forEach(i=>items.push({key:"c"+i.ingredient_id,label:i.ingredient,q:`${fmtN(i.quantite)} ${i.unite||""}`}));
    $("modal").innerHTML=`<div class="modal-head"><div><h3>${esc(c.client||"Commande")}</h3><div class="meta">${dt?dt.toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"}):""}</div></div><button class="modal-close" onclick="closeModal()">×</button></div>
      <div class="modal-body">
        ${c.notes?`<p style="font-size:14px;color:var(--ink-soft);margin-bottom:10px">📝 ${esc(c.notes)}</p>`:""}
        <div class="progress"><i id="prepBar" style="width:0%"></i></div>
        <div id="prepPct" style="font-size:12.5px;color:var(--ink-soft);margin-bottom:14px"></div>
        <div id="prepItems"></div>
      </div>`;
    const box=$("prepItems");
    box.innerHTML=items.map(it=>{const done=prepDone[id].has(it.key);return `<label class="check ${done?"done":""}" data-key="${it.key}"><input type="checkbox" ${done?"checked":""}><span>${esc(it.label)}</span><span class="q">${esc(it.q)}</span></label>`;}).join("")||`<div class="state">Rien à préparer pour cette commande.</div>`;
    function refresh(){const tot=items.length,dn=prepDone[id].size;$("prepBar").style.width=(tot?Math.round(dn/tot*100):0)+"%";$("prepPct").textContent=tot?(dn===tot?"✓ Tout est prêt":`${dn} / ${tot} préparés`):"";}
    box.querySelectorAll(".check").forEach(l=>l.querySelector("input").addEventListener("change",(e)=>{const k=l.dataset.key;if(e.target.checked)prepDone[id].add(k);else prepDone[id].delete(k);l.classList.toggle("done",e.target.checked);refresh();}));
    refresh();
  }catch(e){$("modal").querySelector(".modal-body").innerHTML=`<div class="state"><b>Erreur</b>${esc(e.message)}</div>`;}
}

/* ---------- MODAL / INIT ---------- */
function openModal(html){$("modal").innerHTML=html;$("overlay").classList.add("show");}
function closeModal(){$("overlay").classList.remove("show");}
$("overlay").addEventListener("click",(e)=>{if(e.target===$("overlay"))closeModal();});
document.addEventListener("keydown",(e)=>{if(e.key==="Escape")closeModal();});
(function init(){const t=store.get("dct_token"),u=store.get("dct_user");if(t&&u){try{session.token=t;session.user=JSON.parse(u);enterApp();}catch(_){logout();}}})();
</script>
